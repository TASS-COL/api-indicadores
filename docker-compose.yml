services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: indicators
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indicators"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    restart: unless-stopped

  api:
    build: .
    ports:
      - "3008:3008"
    env_file:
      - .env
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
